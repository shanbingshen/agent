services:
  app-db:
    image: pgvector/pgvector:0.8.0-pg16
    environment:
      POSTGRES_DB: arthra
      POSTGRES_USER: arthra
      POSTGRES_PASSWORD: arthra
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arthra -d arthra"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - arthra-db:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  thingsboard:
    image: thingsboard/tb-postgres:4.2.1.1
    restart: unless-stopped
    ports:
      - "9090:9090"
      - "1883:1883"
    volumes:
      - thingsboard-data:/data
      - thingsboard-logs:/var/log/thingsboard

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - milvus-etcd:/etcd
    restart: unless-stopped

  milvus-minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data
    volumes:
      - milvus-minio:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  milvus-standalone:
    image: milvusdb/milvus:v2.5.4
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    depends_on:
      milvus-etcd:
        condition: service_started
      milvus-minio:
        condition: service_healthy
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://arthra:arthra@app-db:5432/arthra
      LANGGRAPH_DATABASE_URL: postgresql://arthra:arthra@app-db:5432/arthra
      THINGSBOARD_URL: http://thingsboard:9090
      MILVUS_URI: http://milvus-standalone:19530
    depends_on:
      app-db:
        condition: service_healthy
      thingsboard:
        condition: service_started
      milvus-standalone:
        condition: service_healthy
    ports:
      - "18089:18089"
    restart: unless-stopped

  simulator:
    build:
      context: .
      dockerfile: services/simulator/Dockerfile
    env_file: .env
    environment:
      THINGSBOARD_URL: http://thingsboard:9090
      THINGSBOARD_MQTT_HOST: thingsboard
    depends_on:
      thingsboard:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:18089/api/v1
    depends_on:
      - api
    ports:
      - "18090:80"
    restart: unless-stopped

volumes:
  arthra-db:
  thingsboard-data:
  thingsboard-logs:
  milvus-etcd:
  milvus-minio:
  milvus-data:
